services:
  - type: web
    name: mediamanager-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__SecretKey
        sync: false
      - key: Jwt__Issuer
        value: MediaManager
      - key: Jwt__Audience
        value: MediaManagerUsers
      - key: Jwt__ExpirationDays
        value: 30
